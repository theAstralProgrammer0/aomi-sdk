openapi: 3.0.3
info:
  title: Yearn yDaemon API
  description: |
    Yearn yDaemon REST API — public, no auth required.

    Covers the three endpoints used by the Aomi `yearn` app:
      - GET /{chainId}/vaults/all
      - GET /{chainId}/vaults/{address}
      - GET /info/vaults/blacklisted

    Default host is `https://ydaemon.yearn.fi`. Response schemas are
    intentionally narrowed to the subset of fields that the assistant
    actually reasons about (address, symbol, TVL, net APY, fees, kind,
    version, underlying token). The live API returns many more fields
    (icons, descriptions, risk vectors, debts, migration metadata, ...);
    those are dropped by serde at deserialization time.
  version: '1.0'
servers:
- url: https://ydaemon.yearn.fi
paths:
  /{chainId}/vaults/all:
    get:
      summary: List every vault on a chain (TVL, APY/APR, strategies, fees, etc.).
      operationId: getAllVaults
      parameters:
      - in: path
        name: chainId
        description: Chain ID (e.g. 1, 10, 137, 250, 8453, 42161).
        required: true
        schema:
          type: integer
          format: int64
        style: simple
      responses:
        '200':
          description: Array of vault objects.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/YearnVault'
  /{chainId}/vaults/{address}:
    get:
      summary: Deep-dive a single vault by address.
      operationId: getVaultDetail
      parameters:
      - in: path
        name: chainId
        required: true
        schema:
          type: integer
          format: int64
        style: simple
      - in: path
        name: address
        description: Vault contract address (0x...).
        required: true
        schema:
          type: string
        style: simple
      responses:
        '200':
          description: Vault detail object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/YearnVault'
  /info/vaults/blacklisted:
    get:
      summary: Cross-chain list of vaults removed from the official Yearn UI.
      operationId: getBlacklistedVaults
      responses:
        '200':
          description: Array of blacklisted vault contract addresses.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
components:
  schemas:
    YearnVault:
      type: object
      properties:
        address:
          description: Vault contract address (0x...)
          type: string
        chainID:
          type: integer
          format: int64
        name:
          nullable: true
          type: string
        symbol:
          nullable: true
          type: string
        version:
          nullable: true
          type: string
        kind:
          nullable: true
          description: e.g. 'Single Strategy', 'Multi Strategy', 'Legacy'
          type: string
        category:
          nullable: true
          type: string
        token:
          $ref: '#/components/schemas/YearnUnderlyingToken'
        tvl:
          $ref: '#/components/schemas/YearnTvl'
        apr:
          $ref: '#/components/schemas/YearnApr'
      required:
      - address
      - chainID
    YearnUnderlyingToken:
      type: object
      properties:
        address:
          nullable: true
          type: string
        symbol:
          nullable: true
          type: string
        name:
          nullable: true
          type: string
        decimals:
          nullable: true
          type: integer
          format: int64
    YearnTvl:
      type: object
      properties:
        tvl:
          nullable: true
          description: USD TVL
          type: number
          format: double
        totalAssets:
          nullable: true
          description: Raw token amount as decimal string
          type: string
        price:
          nullable: true
          description: Underlying token price in USD
          type: number
          format: double
    YearnApr:
      type: object
      properties:
        type:
          nullable: true
          type: string
        netAPR:
          nullable: true
          description: 'Realised net APY (post-fee). Decimal: 0.05 = 5%.'
          type: number
          format: double
        fees:
          $ref: '#/components/schemas/YearnAprFees'
        forwardAPR:
          $ref: '#/components/schemas/YearnForwardApr'
    YearnAprFees:
      type: object
      properties:
        performance:
          nullable: true
          type: number
          format: double
        management:
          nullable: true
          type: number
          format: double
    YearnForwardApr:
      type: object
      properties:
        type:
          nullable: true
          type: string
        netAPR:
          nullable: true
          description: Forward-looking net APY (post-fee). Decimal.
          type: number
          format: double
