            application/json:
              schema:
                type: object
                properties:
                  balances:
                    type: array
                    items:
                      type: object
                      properties:
                        address:
                          example: 0x5a927ac639636e534b678e81768ca19e2c6280b7
                          description: Token contract address
                          type: string
                          pattern: ^0x[a-fA-F0-9]{40}$
                        balance:
                          example: '1000000000'
                          description: Raw token balance
                          type: string
                        balance_usd:
                          nullable: true
                          example: '1000.50'
                          description: Balance value in USD
                          type: string
                        decimals:
                          example: 6
                          description: Token decimals
                          type: integer
                        image_url:
                          nullable: true
                          example: https://example.com/token.png
                          description: Token logo URL
                          type: string
                        name:
                          example: USD Coin
                          description: Token name
                          type: string
                        network:
                          $ref: '#/components/schemas/Network'
                        price_usd:
                          nullable: true
                          example: '1.00'
                          description: Token price in USD
                          type: string
                        symbol:
                          example: USDC
                          description: Token symbol
                          type: string
                      required:
                      - network
                      - address
                      - name
                      - symbol
                      - decimals
                      - balance
                      - balance_usd
                      - price_usd
                      - image_url
                  next:
                    type: object
                    properties:
                      cursor:
                        nullable: true
                        description: Pagination cursor for next page, null if no more results
                        type: string
                    required:
                    - cursor
                required:
                - balances
                - next
