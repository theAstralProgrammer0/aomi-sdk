  /v2/farcaster/nft/deploy/erc721/:
    post:
      tags:
      - Onchain
      summary: Deploy ERC-721 collection
      description: Deploy a new ERC-721A (series) NFT collection.
      externalDocs:
        url: https://docs.neynar.com/reference/deploy-erc721
      operationId: deploy-erc721
      parameters:
      - $ref: '#/components/parameters/WalletIdHeader'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                external_link:
                  type: string
                image:
                  type: string
                max_supply:
                  description: Max supply (0 = unlimited)
                  default: 0
                  type: integer
                  minimum: 0
                  maximum: 281474976710655
                mint_config:
                  type: object
                  properties:
                    end_timestamp:
                      description: Unix timestamp (defaults to no end date)
                      type: integer
                      minimum: 0
                      maximum: 281474976710655
                    max_per_tx:
                      description: Max tokens per transaction (0 = unlimited)
                      default: 0
                      type: integer
                      minimum: 0
                      maximum: 281474976710655
                    max_per_wallet:
                      description: Max tokens per wallet (0 = unlimited)
                      default: 0
                      type: integer
                      minimum: 0
                      maximum: 281474976710655
                    price_per_token:
                      description: Price per token in wei (0 = free mint)
                      default: '0'
                      type: string
                      pattern: ^\d{1,57}$
                    start_timestamp:
                      description: Unix timestamp (defaults to current time)
                      type: integer
                      minimum: 0
                      maximum: 281474976710655
                name:
                  type: string
                  minLength: 1
                  maxLength: 255
                network:
                  type: string
                  enum:
                  - base
                  - optimism
                  - base-sepolia
                royalty_bps:
                  description: Royalty in basis points (500 = 5%, max 2500 = 25%)
                  default: 0
                  type: integer
                  minimum: 0
                  maximum: 2500
                royalty_recipient:
                  example: 0x5a927ac639636e534b678e81768ca19e2c6280b7
                  description: Defaults to creator wallet
                  type: string
                  pattern: ^0x[a-fA-F0-9]{40}$
                symbol:
                  type: string
                  minLength: 1
                  maxLength: 32
              required:
              - network
              - name
              - symbol
        required: true
      responses:
        '201':
