  /v2/studio/deployment/database/tables/{table_name}/schema:
    get:
      tags:
      - studio
      summary: Get table schema
      description: Retrieves the complete schema for a table including columns, indexes, and foreign keys.
      externalDocs:
        url: https://docs.neynar.com/reference/get-table-schema
      operationId: get-table-schema
      parameters:
      - in: path
        name: table_name
        required: true
        schema:
          type: string
        style: simple
      - in: query
        name: deployment_id
        description: Deployment ID (UUID)
        required: true
        schema:
          type: string
          format: uuid
        style: form
      - in: query
        name: fid
        description: Farcaster ID of the user. Required for non-admin users.
        schema:
          example: 3
          type: integer
          format: int32
          minimum: 0
        style: form
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  columns:
                    description: Table columns
                    type: array
                    items:
                      type: object
                      properties:
                        defaultValue:
                          nullable: true
                          description: Default value expression
                          type: string
                        isPrimaryKey:
                          description: Whether the column is part of primary key
                          type: boolean
                        name:
                          description: Column name
                          type: string
                        nullable:
                          description: Whether the column allows NULL values
                          type: boolean
                        position:
                          description: Ordinal position in table
                          type: number
                        type:
                          description: Column data type
                          type: string
                      required:
                      - name
                      - type
                      - nullable
                      - defaultValue
                      - isPrimaryKey
                      - position
                  foreignKeys:
                    description: Foreign key relationships
                    type: array
                    items:
                      type: object
                      properties:
                        columnName:
                          description: Local column name
                          type: string
                        constraintName:
                          description: Constraint name
                          type: string
                        referencedColumn:
                          description: Referenced column name
                          type: string
                        referencedTable:
                          description: Referenced table name
                          type: string
                      required:
                      - constraintName
                      - columnName
                      - referencedTable
                      - referencedColumn
                  indexes:
                    description: Table indexes
                    type: array
                    items:
                      type: object
                      properties:
                        columns:
                          description: Columns in the index
                          type: array
                          items:
                            type: string
                        isPrimary:
                          description: Whether this is the primary key index
                          type: boolean
                        isUnique:
                          description: Whether the index enforces uniqueness
                          type: boolean
                        name:
                          description: Index name
                          type: string
                      required:
                      - name
                      - columns
                      - isUnique
                      - isPrimary
                  primaryKeyColumns:
                    description: Primary key column names
                    type: array
                    items:
                      type: string
                  tableName:
                    description: Table name
                    type: string
                required:
                - tableName
                - columns
                - indexes
                - foreignKeys
                - primaryKeyColumns
      security:
      - ApiKeyAuth: []
