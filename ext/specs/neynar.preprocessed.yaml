  /v2/signature/x402/:
    post:
      tags:
      - Onchain
      summary: Create x402 signature
      description: Create a signature for a given x402 resource using the specified wallet.
      externalDocs:
        url: https://docs.neynar.com/reference/create-x402-signature
      operationId: create-x402-signature
      parameters:
      - $ref: '#/components/parameters/WalletIdHeader'
      - in: header
        name: x-api-key
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                payment_requirements:
                  type: object
                  properties:
                    accepts:
                      type: array
                      items:
                        type: object
                        properties:
                          asset:
                            $ref: '#/components/schemas/EthAddress'
                          description:
                            type: string
                          extra:
                            nullable: true
                            type: object
                            additionalProperties: {}
                          maxAmountRequired:
                            type: string
                          maxTimeoutSeconds:
                            type: number
                          mimeType:
                            type: string
                          network:
                            type: string
                            enum:
                            - base
                            - base-sepolia
                          outputSchema:
                            nullable: true
                            type: object
                            additionalProperties: {}
                          payTo:
                            $ref: '#/components/schemas/EthAddress'
                          resource:
                            type: string
                            format: uri
                          scheme:
                            type: string
                            enum:
                            - exact
                        required:
                        - scheme
                        - network
                        - maxAmountRequired
                        - asset
                        - payTo
                        - resource
                        - description
                        - maxTimeoutSeconds
                      minItems: 1
                    x402Version:
                      type: number
                      enum:
                      - 1.0
                  required:
                  - x402Version
                  - accepts
              required:
              - payment_requirements
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  network:
                    type: string
                    enum:
                    - base
                    - base-sepolia
                  payload:
                    type: object
                    properties:
                      authorization:
                        type: object
                        properties:
                          from:
                            $ref: '#/components/schemas/EthAddress'
                          nonce:
                            type: string
                            pattern: ^0x[a-fA-F0-9]{64}$
                          to:
                            $ref: '#/components/schemas/EthAddress'
                          validAfter:
                            type: string
                          validBefore:
                            type: string
                          value:
                            type: string
                        required:
                        - from
                        - to
                        - value
                        - validAfter
                        - validBefore
                        - nonce
                      signature:
                        type: string
                        pattern: ^0x[a-fA-F0-9]{130}$
                    required:
                    - signature
                    - authorization
                  scheme:
                    type: string
                    enum:
                    - exact
                  x402Version:
                    type: number
                    enum:
                    - 1.0
                required:
                - x402Version
                - scheme
                - network
                - payload
