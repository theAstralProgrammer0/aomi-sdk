    SimulateNftMintResponse:
      title: SimulateNftMintResponse
      description: Calldata simulations for NFT minting.
      type: array
      items:
        type: object
        properties:
          abi:
            nullable: true
            description: ABI for the mint function.
          args:
            type: array
            items: {}
          calldata:
            example: '0xabcdef'
            description: Calldata for the mint transaction.
            type: string
          data:
            example: '0x1234abcd'
            type: string
          estimated_total_cost_wei:
            example: '100000000000000'
            description: Estimated total cost in wei (value + gas). Use this for price display.
            type: string
          function_name:
            example: mintTo
            type: string
          network:
            example: base
            type: string
          recipient:
            description: NFT mint recipient. Exactly one of "address" or "fid" must be set.
            anyOf:
            - type: object
              properties:
                address:
                  $ref: '#/components/schemas/EthAddress'
                fid:
                  not: {}
                quantity:
                  example: 1
                  description: Quantity to mint (must be at least 1). Defaults to 1.
                  default: 1
                  type: integer
                  minimum: 1
              required:
              - address
            - type: object
              properties:
                address:
                  not: {}
                fid:
                  $ref: '#/components/schemas/Fid'
                quantity:
                  example: 1
                  description: Quantity to mint (must be at least 1). Defaults to 1.
                  default: 1
                  type: integer
                  minimum: 1
              required:
              - fid
          to:
            $ref: '#/components/schemas/EthAddress'
          value:
            example: '0'
            type: string
        required:
        - recipient
        - function_name
        - args
        - to
        - data
        - value
        - estimated_total_cost_wei
        - network
        - calldata
