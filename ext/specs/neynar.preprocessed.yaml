      externalDocs:
        url: https://docs.neynar.com/reference/fetch-relevant-frames
      operationId: fetch-relevant-frames
      parameters:
      - in: query
        name: viewer_fid
        description: FID of the user to fetch relevant mini apps for
        required: true
        schema:
          type: integer
          minimum: 1
