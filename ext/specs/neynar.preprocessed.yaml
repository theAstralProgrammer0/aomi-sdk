            application/json:
              schema:
                type: object
                properties:
                  collection:
                    type: object
                    properties:
                      address:
                        $ref: '#/components/schemas/EthAddress'
                      name:
                        type: string
                      network:
                        type: string
                        enum:
                        - base
                        - optimism
                        - base-sepolia
                      symbol:
                        type: string
                      transaction_hash:
                        type: string
                        pattern: ^0x[a-fA-F0-9]{64}$
                      type:
                        type: string
                        enum:
                        - ERC721
                    required:
                    - type
                    - network
                    - address
                    - name
                    - symbol
                    - transaction_hash
                  object:
                    type: string
                    enum:
                    - nft_collection
                required:
                - object
                - collection
  /v2/farcaster/nft/image/:
    post:
      tags:
      - Onchain
      summary: Generate an NFT image
      description: Generate a new image or edit existing images using AI. Returns a publicly accessible URL to the generated image.
      externalDocs:
        url: https://docs.neynar.com/reference/generate-image
      operationId: generate-image
