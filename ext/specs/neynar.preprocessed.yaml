              schema:
                type: object
                properties:
                  object:
                    type: string
                    enum:
                    - fungible_trades
                  trades:
                    type: array
                    items:
                      type: object
                      properties:
                        object:
                          type: string
                          enum:
                          - trade
                        pool:
                          type: object
                          properties:
                            address:
                              type: string
                            object:
                              type: string
                              enum:
                              - pool
                            protocol_family:
                              type: string
                            protocol_version:
                              type: string
                          required:
                          - object
                          - address
                        trader:
                          $ref: '#/components/schemas/UserDehydrated'
                        transaction:
                          type: object
                          properties:
                            hash:
                              type: string
                            net_transfer:
                              type: object
                              properties:
                                object:
                                  type: string
                                  enum:
                                  - net_transfer
                                receiving_fungible:
                                  $ref: '#/components/schemas/FungibleBalance'
                                sending_fungible:
                                  $ref: '#/components/schemas/FungibleBalance'
                              required:
                              - object
                              - receiving_fungible
                              - sending_fungible
                            network:
                              type: object
                              properties:
                                name:
                                  type: string
                                object:
                                  type: string
                                  enum:
                                  - network
                              required:
                              - object
                              - name
                          required:
                          - hash
                          - network
                          - net_transfer
                      required:
                      - object
                      - trader
                      - transaction
                required:
                - object
                - trades
