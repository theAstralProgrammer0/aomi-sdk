    post:
      tags:
      - studio
      summary: Query table data
      description: Query data from a table with pagination and sorting.
      externalDocs:
        url: https://docs.neynar.com/reference/query-table
      operationId: query-table
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                columns:
                  description: Columns to select (defaults to all)
                  type: array
                  items:
                    type: string
                deployment_id:
                  description: Deployment ID (UUID)
                  type: string
                  format: uuid
                fid:
                  example: 3
                  description: Farcaster ID of the user. Required for non-admin users.
                  type: integer
                  format: int32
                  minimum: 0
                limit:
                  description: 'Maximum rows to return (default: 100, max: 1000)'
                  type: number
                  minimum: 1.0
                  maximum: 1000.0
                offset:
                  description: Number of rows to skip
                  type: number
                  minimum: 0.0
                orderBy:
                  description: Column to sort by
                  type: string
                orderDirection:
                  description: Sort direction
                  type: string
                  enum:
                  - asc
                  - desc
                table:
                  description: Table name to query
                  type: string
                  minLength: 1
              required:
              - deployment_id
              - table
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  columns:
                    description: Column metadata
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          description: Column name
                          type: string
                        type:
                          description: Column data type
                          type: string
                      required:
                      - name
                      - type
                  hasMore:
                    description: Whether more rows are available
                    type: boolean
                  limit:
                    description: Applied limit
                    type: number
                  offset:
                    description: Applied offset
                    type: number
                  rows:
                    description: Query result rows
                    type: array
                    items:
                      type: object
                      additionalProperties: {}
                  totalCount:
                    description: Total number of rows in table
                    type: number
                required:
                - columns
                - rows
                - totalCount
                - limit
                - offset
                - hasMore
      security:
      - ApiKeyAuth: []
