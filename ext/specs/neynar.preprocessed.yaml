                  description: Deployment ID
                  type: string
                  format: uuid
                name:
                  description: Kubernetes deployment name
                  type: string
                namespace:
                  description: Kubernetes namespace
                  type: string
        required: true
      responses:
        '200':
          description: Success
      security:
      - ApiKeyAuth: []
