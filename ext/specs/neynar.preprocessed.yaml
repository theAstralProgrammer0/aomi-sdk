        content:
          application/json:
            schema:
              type: object
              properties:
                contract_address:
                  $ref: '#/components/schemas/EthAddress'
                network:
                  type: string
                  enum:
                  - base
                  - optimism
                  - base-sepolia
                tokens:
                  type: array
                  items:
                    type: object
                    properties:
                      metadata:
                        type: object
                        properties:
                          animation_url:
                            type: string
                          attributes:
                            type: array
                            items:
                              type: object
                              properties:
                                display_type:
                                  type: string
                                  enum:
                                  - number
                                  - boost_number
                                  - boost_percentage
                                  - date
                                max_value:
                                  type: number
                                trait_type:
                                  type: string
                                value:
                                  oneOf:
                                  - type: string
                                  - type: number
                              required:
                              - trait_type
                              - value
                          background_color:
                            type: string
                            pattern: ^[0-9a-fA-F]{6}$
                          description:
                            type: string
                          external_url:
                            type: string
