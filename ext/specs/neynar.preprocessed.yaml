              items:
                $ref: '#/components/schemas/User'
          required:
          - users
      required:
      - result
    UserViewerContext:
      title: UserViewerContext
      description: Adds context on the viewer's follow relationship with the user.
      type: object
      properties:
        blocked_by:
          description: Indicates if the viewer is blocked by the user.
          type: boolean
        blocking:
          description: Indicates if the viewer is blocking the user.
          type: boolean
        followed_by:
          description: Indicates if the viewer is followed by the user.
          type: boolean
        following:
          description: Indicates if the viewer is following the user.
          type: boolean
      required:
      - following
      - followed_by
      - blocking
      - blocked_by
    UsersActiveChannelsResponse:
      title: UsersActiveChannelsResponse
      type: object
      properties:
        channels:
          type: array
          items:
            $ref: '#/components/schemas/Channel'
        next:
          $ref: '#/components/schemas/NextCursor'
    UsersResponse:
      title: UsersResponse
      type: object
      properties:
        next:
          $ref: '#/components/schemas/NextCursor'
        users:
          type: array
          items:
            $ref: '#/components/schemas/User'
      required:
      - users
      - next
    Verification:
      title: Verification
      description: Verification details of an address
      type: object
      properties:
        address:
          example: 0x5a927ac639636e534b678e81768ca19e2c6280b7
          description: Address string (hex for ethereum, base58 for solana)
          type: string
        app:
          $ref: '#/components/schemas/UserDehydrated'
        object:
          type: string
          enum:
          - verification
        protocol:
          $ref: '#/components/schemas/Protocol'
        verified_at:
          example: 2024-01-01T00:00:00.000Z
          description: ISO timestamp when the verification was created
          type: string
      required:
      - object
      - address
      - protocol
      - verified_at
    VerificationChainId:
      title: VerificationChainId
      description: Chain ID for farcaster verifications. 0 for EOA verifications, 1 or 10 for contract verifications
      default: 0
      type: integer
      format: int32
      anyOf:
      - type: number
        enum:
        - 0.0
      - type: number
        enum:
        - 1.0
      - type: number
        enum:
        - 10.0
    VerificationType:
      title: VerificationType
      description: Type of verification. 0 = EOA, 1 = contract
      default: 0
      type: integer
      format: int32
      anyOf:
      - type: number
        enum:
        - 0.0
      - type: number
        enum:
        - 1.0
    VideoObject:
      title: VideoObject
      type: object
      properties:
        height:
          type: string
        type:
          type: string
        url:
          type: string
        width:
          type: string
      required:
      - url
    Webhook:
      title: Webhook
      type: object
      properties:
        active:
          type: boolean
        created_at:
          type: string
          format: date-time
        deleted_at:
          nullable: true
          type: string
          format: date-time
        description:
          type: string
        developer_uuid:
          type: string
        http_timeout:
          type: string
        object:
          type: string
          enum:
          - webhook
        rate_limit:
          type: integer
        rate_limit_duration:
          type: string
        secrets:
          type: array
          items:
            $ref: '#/components/schemas/WebhookSecret'
        subscription:
          $ref: '#/components/schemas/WebhookSubscription'
        target_url:
          type: string
        title:
          type: string
        updated_at:
          type: string
          format: date-time
        webhook_id:
          type: string
      required:
      - object
      - webhook_id
      - developer_uuid
      - target_url
      - title
      - secrets
      - description
      - http_timeout
      - rate_limit
      - active
      - rate_limit_duration
      - created_at
      - updated_at
      - deleted_at
    WebhookDeleteReqBody:
      title: WebhookDeleteReqBody
      type: object
      properties:
        webhook_id:
          type: string
      required:
      - webhook_id
    WebhookListResponse:
      title: WebhookListResponse
      type: object
      properties:
        webhooks:
          type: array
          items:
            $ref: '#/components/schemas/Webhook'
      required:
      - webhooks
    WebhookPatchReqBody:
      title: WebhookPatchReqBody
      type: object
      properties:
        active:
          type: string
          enum:
          - 'true'
          - 'false'
        webhook_id:
          type: string
      required:
      - webhook_id
      - active
    WebhookPostReqBody:
      title: WebhookPostReqBody
      type: object
      properties:
        name:
          type: string
        subscription:
          $ref: '#/components/schemas/WebhookSubscriptionFilters'
        url:
          type: string
      required:
      - name
      - url
    WebhookPutReqBody:
      title: WebhookPutReqBody
      type: object
      properties:
        name:
          type: string
        subscription:
          $ref: '#/components/schemas/WebhookSubscriptionFilters'
        url:
          type: string
        webhook_id:
          type: string
      required:
      - name
      - url
      - webhook_id
    WebhookResponse:
      title: WebhookResponse
      type: object
      properties:
        message:
          type: string
        success:
          type: boolean
        webhook:
          $ref: '#/components/schemas/Webhook'
    WebhookSecret:
      title: WebhookSecret
      type: object
      properties:
        created_at:
          type: string
        deleted_at:
          nullable: true
          type: string
        expires_at:
          type: string
        uid:
          type: string
        updated_at:
          type: string
        value:
          type: string
      required:
      - uid
      - value
      - expires_at
      - created_at
      - updated_at
      - deleted_at
    WebhookSubscription:
      title: WebhookSubscription
      type: object
      properties:
        created_at:
          type: string
          format: date-time
        filters:
          $ref: '#/components/schemas/WebhookSubscriptionFilters'
        object:
          type: string
          enum:
          - webhook_subscription
        subscription_id:
          type: string
        updated_at:
          type: string
          format: date-time
      required:
      - object
      - subscription_id
      - filters
      - created_at
      - updated_at
    WebhookSubscriptionFilters:
      title: WebhookSubscriptionFilters
      type: object
      properties:
        cast.created:
          $ref: '#/components/schemas/WebhookSubscriptionFiltersCast'
        cast.deleted:
          $ref: '#/components/schemas/WebhookSubscriptionFiltersCast'
        follow.created:
          $ref: '#/components/schemas/WebhookSubscriptionFiltersFollow'
        follow.deleted:
          $ref: '#/components/schemas/WebhookSubscriptionFiltersFollow'
        reaction.created:
          $ref: '#/components/schemas/WebhookSubscriptionFiltersReaction'
        reaction.deleted:
          $ref: '#/components/schemas/WebhookSubscriptionFiltersReaction'
        trade.created:
          $ref: '#/components/schemas/WebhookSubscriptionFiltersTrade'
        user.created:
          type: object
        user.updated:
          type: object
          properties:
            fids:
              type: array
              items:
                type: integer
    WebhookSubscriptionFiltersCast:
      title: WebhookSubscriptionFiltersCast
      type: object
      properties:
        author_fids:
          type: array
          items:
            type: integer
        embedded_cast_author_fids:
          description: Filter for casts that contain embedded casts authored by these FIDs
          type: array
          items:
            type: number
        embedded_cast_hashes:
          description: Filter for casts that quote/embed these specific cast hashes
          type: array
          items:
            type: string
        embeds:
          example: "\b(farcaster|neynar)\b"
          description: "Regex pattern to match the embeded_url (key embeds) of the cast.\n**Note:** \n1) Regex must be parsed by Go's RE2 engine (Test your expression here: https://www.lddgo.net/en/string/golangregex)\n2) Use backslashes to escape special characters.\nFor example: \\\\b(farcaster|neynar)\\\\b should be written as \\\\\\\\b(farcaster|neynar)\\\\\\\\b"
          type: string
        exclude_author_fids:
          description: |-
            Exclude casts that matches these authors.
            **Note:**
            This is applied as an AND operation against rest of the filters.
            Rest of the filters are bundled as an OR operation.
          type: array
          items:
            type: integer
        mentioned_fids:
          type: array
          items:
            type: integer
        minimum_author_score:
          default: 0
          type: number
          minimum: 0.0
          maximum: 1.0
        parent_author_fids:
          type: array
          items:
            type: integer
        parent_hashes:
          type: array
          items:
            type: string
        parent_urls:
          type: array
          items:
            type: string
        root_parent_urls:
          type: array
          items:
            type: string
        text:
          example: (?i)\$degen
          description: "Regex pattern to match the text key of the cast.\n**Note:** \n1) Regex must be parsed by Go's RE2 engine (Test your expression here: https://www.lddgo.net/en/string/golangregex)\n2) Use backslashes to escape special characters.\nFor example: (?i)\\\\$degen should be written as (?i)\\\\\\\\$degen"
          type: string
    WebhookSubscriptionFiltersFollow:
      title: WebhookSubscriptionFiltersFollow
      type: object
      properties:
        fids:
          type: array
          items:
            type: integer
        target_fids:
          type: array
          items:
            type: integer
    WebhookSubscriptionFiltersReaction:
      title: WebhookSubscriptionFiltersReaction
      type: object
      properties:
        fids:
          type: array
          items:
            type: integer
        target_cast_hashes:
          type: array
          items:
            example: 0x71d5225f77e0164388b1d4c120825f3a2c1f131c
            type: string
            pattern: ^(0x)?[a-fA-F0-9]{40}$
        target_fids:
          type: array
          items:
            type: integer
    WebhookSubscriptionFiltersTrade:
      title: WebhookSubscriptionFiltersTrade
      type: object
      properties:
        fids:
          type: array
          items:
            type: integer
        minimum_token_amount_usdc:
          type: number
          minimum: 0.0
        minimum_trader_neynar_score:
          type: number
          minimum: 0.0
          maximum: 1.0
    ZodError:
      title: ZodError
      type: object
      properties:
        code:
          example: InvalidField
          type: string
        errors:
          type: array
          items:
            type: object
            properties:
              code:
                type: string
              expected:
                type: string
              message:
                type: string
              path:
                type: array
                items:
                  type: string
              received:
                type: string
            required:
            - code
            - expected
            - received
            - path
            - message
        message:
          example: Invalid query parameters
          type: string
      required:
      - message
      - code
      - errors
    NotificationTypeFilter:
      title: NotificationType
      description: The type of notification to mark as seen. If not provided, all notifications will be marked as seen.
      type: string
      enum:
      - follows
      - recasts
      - likes
      - mentions
      - replies
      - quotes
    NotificationCampaignStatusEnum:
      title: NotificationCampaignStatus
      description: Always "queued" for a successful async enqueue.
      type: string
      enum:
      - queued
      - running
      - completed
      - failed
      - canceled
    SubscribedToObjectInfo:
      title: SubscribedToObject
      type: object
      properties:
        chain:
          example: 8453
          type: integer
        contract_address:
          example: 0x325b3e2c19f4900f8f4eb5f6872dc2715e77cbac
          type: string
        expires_at:
          example: 2023-09-13T22:10:22.000Z
          type: string
          format: date-time
        object:
          type: string
          enum:
          - subscription_dehydrated
        protocol_version:
          example: 1
          type: integer
        provider_name:
          example: fabric_stp
          type: string
        subscribed_at:
          example: 2023-09-13T22:10:22.000Z
          type: string
          format: date-time
        tier_id:
          example: '0'
          type: string
      required:
      - object
      - provider_name
  parameters:
    AuthorizationHeader:
      in: header
      name: Authorization
      description: Optional Bearer token for certain endpoints. The token format is described [here](https://docs.farcaster.xyz/reference/warpcast/api#authentication).
      schema:
        example: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      x-is-global-header: true
      style: simple
    NeynarExperimentalHeader:
      in: header
      name: x-neynar-experimental
      description: Enables experimental features including filtering based on the Neynar score. See [docs](https://neynar.notion.site/Experimental-Features-1d2655195a8b80eb98b4d4ae7b76ae4a) for more details.
      schema:
        default: false
        type: boolean
      x-is-global-header: true
      style: simple
    WalletIdHeader:
      in: header
      name: x-wallet-id
      description: Wallet ID to use for transactions
      required: true
      schema:
        type: string
      x-is-global-header: true
      style: simple
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: API key to authorize requests
      x-default: NEYNAR_API_DOCS
security:
- ApiKeyAuth: []
