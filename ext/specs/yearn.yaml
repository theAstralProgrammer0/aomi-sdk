openapi: 3.0.3
info:
  title: Yearn yDaemon API
  version: '1.0'
  description: |
    Yearn yDaemon REST API — public, no auth required.

    Covers the three endpoints used by the Aomi `yearn` app:
      - GET /{chainId}/vaults/all
      - GET /{chainId}/vaults/{address}
      - GET /info/vaults/blacklisted

    Default host is `https://ydaemon.yearn.fi`. Response schemas are
    intentionally narrowed to the subset of fields that the assistant
    actually reasons about (address, symbol, TVL, net APY, fees, kind,
    version, underlying token). The live API returns many more fields
    (icons, descriptions, risk vectors, debts, migration metadata, ...);
    those are dropped by serde at deserialization time.

servers:
  - url: https://ydaemon.yearn.fi

paths:
  /{chainId}/vaults/all:
    get:
      operationId: getAllVaults
      summary: List every vault on a chain (TVL, APY/APR, strategies, fees, etc.).
      parameters:
        - in: path
          name: chainId
          required: true
          schema: { type: integer, format: int64 }
          description: Chain ID (e.g. 1, 10, 137, 250, 8453, 42161).
      responses:
        '200':
          description: Array of vault objects.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/YearnVault' }

  /{chainId}/vaults/{address}:
    get:
      operationId: getVaultDetail
      summary: Deep-dive a single vault by address.
      parameters:
        - in: path
          name: chainId
          required: true
          schema: { type: integer, format: int64 }
        - in: path
          name: address
          required: true
          schema: { type: string }
          description: Vault contract address (0x...).
      responses:
        '200':
          description: Vault detail object.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/YearnVault' }

  /info/vaults/blacklisted:
    get:
      operationId: getBlacklistedVaults
      summary: Cross-chain list of vaults removed from the official Yearn UI.
      responses:
        '200':
          description: Array of blacklisted vault contract addresses.
          content:
            application/json:
              schema:
                type: array
                items: { type: string }

components:
  schemas:
    YearnVault:
      type: object
      required: [address, chainID]
      properties:
        address:    { type: string, description: "Vault contract address (0x...)" }
        chainID:    { type: integer, format: int64 }
        name:       { type: string, nullable: true }
        symbol:     { type: string, nullable: true }
        version:    { type: string, nullable: true }
        kind:       { type: string, nullable: true, description: "e.g. 'Single Strategy', 'Multi Strategy', 'Legacy'" }
        category:   { type: string, nullable: true }
        token:      { $ref: '#/components/schemas/YearnUnderlyingToken' }
        tvl:        { $ref: '#/components/schemas/YearnTvl' }
        apr:        { $ref: '#/components/schemas/YearnApr' }

    YearnUnderlyingToken:
      type: object
      properties:
        address:  { type: string, nullable: true }
        symbol:   { type: string, nullable: true }
        name:     { type: string, nullable: true }
        decimals: { type: integer, format: int64, nullable: true }

    YearnTvl:
      type: object
      properties:
        tvl:         { type: number, format: double, nullable: true, description: "USD TVL" }
        totalAssets: { type: string, nullable: true, description: "Raw token amount as decimal string" }
        price:       { type: number, format: double, nullable: true, description: "Underlying token price in USD" }

    YearnApr:
      type: object
      properties:
        type:       { type: string, nullable: true }
        netAPR:     { type: number, format: double, nullable: true, description: "Realised net APY (post-fee). Decimal: 0.05 = 5%." }
        fees:       { $ref: '#/components/schemas/YearnAprFees' }
        forwardAPR: { $ref: '#/components/schemas/YearnForwardApr' }

    YearnAprFees:
      type: object
      properties:
        performance: { type: number, format: double, nullable: true }
        management:  { type: number, format: double, nullable: true }

    YearnForwardApr:
      type: object
      properties:
        type:   { type: string, nullable: true }
        netAPR: { type: number, format: double, nullable: true, description: "Forward-looking net APY (post-fee). Decimal." }
