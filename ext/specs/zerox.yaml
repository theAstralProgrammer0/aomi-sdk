openapi: 3.0.3
info:
  title: 0x Swap API
  version: 2.0.0
  description: |
    0x Swap API v2 — quote and execute same-chain ERC-20 / native swaps either
    via the AllowanceHolder on-chain path or via the gasless relayer (sign
    EIP-712, relayer pays gas).

    ## Auth
    All endpoints require an API key in the `0x-api-key` request header. The
    `0x-version: v2` header is also required by the production API.

    ## Chain selection
    Chain is selected via the `chainId` query parameter (numeric).

    ## Native asset
    Use the sentinel address `0xeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeee`
    to represent the native asset of a chain (ETH, MATIC, BNB, AVAX, ...).

    Endpoints covered: AllowanceHolder price/quote, gasless quote/submit/status.
servers:
  - url: https://api.0x.org
    description: Production
security:
  - apiKey: []
paths:
  /swap/allowance-holder/price:
    get:
      operationId: getAllowanceHolderPrice
      summary: Indicative AllowanceHolder price (no signing required)
      parameters:
        - $ref: '#/components/parameters/ChainIdQuery'
        - $ref: '#/components/parameters/SellTokenQuery'
        - $ref: '#/components/parameters/BuyTokenQuery'
        - $ref: '#/components/parameters/SellAmountQuery'
        - $ref: '#/components/parameters/SlippagePercentageQuery'
        - $ref: '#/components/parameters/TakerQuery'
      responses:
        '200':
          description: AllowanceHolder price quote
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SwapQuote'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /swap/allowance-holder/quote:
    get:
      operationId: getAllowanceHolderQuote
      summary: Firm AllowanceHolder quote with executable transaction
      parameters:
        - $ref: '#/components/parameters/ChainIdQuery'
        - $ref: '#/components/parameters/SellTokenQuery'
        - $ref: '#/components/parameters/BuyTokenQuery'
        - $ref: '#/components/parameters/SellAmountQuery'
        - $ref: '#/components/parameters/SlippagePercentageQuery'
        - $ref: '#/components/parameters/TakerQuery'
      responses:
        '200':
          description: AllowanceHolder quote with `transaction` payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SwapQuote'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /gasless/quote:
    get:
      operationId: getGaslessQuote
      summary: Firm gasless quote (returns EIP-712 typed data to sign)
      parameters:
        - $ref: '#/components/parameters/ChainIdQuery'
        - $ref: '#/components/parameters/SellTokenQuery'
        - $ref: '#/components/parameters/BuyTokenQuery'
        - $ref: '#/components/parameters/SellAmountQuery'
        - $ref: '#/components/parameters/SlippagePercentageQuery'
        - $ref: '#/components/parameters/TakerQuery'
      responses:
        '200':
          description: Gasless quote with `trade` (and optionally `approval`) typed data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SwapQuote'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /gasless/submit:
    post:
      operationId: submitGasless
      summary: Submit signed gasless trade (and approval) to the 0x relayer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GaslessSubmitRequest'
      responses:
        '200':
          description: Submission accepted; returns a tradeHash to poll
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SwapQuote'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /gasless/status/{tradeHash}:
    get:
      operationId: getGaslessStatus
      summary: Poll the lifecycle of a submitted gasless trade
      parameters:
        - in: path
          name: tradeHash
          required: true
          schema:
            type: string
          description: Hash returned by `submitGasless`.
        - in: query
          name: chainId
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Trade status (pending / succeeded / confirmed / failed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SwapQuote'
        '400':
          $ref: '#/components/responses/ErrorResponse'

components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: 0x-api-key

  parameters:
    ChainIdQuery:
      in: query
      name: chainId
      required: true
      schema:
        type: integer
        format: int64
      description: Numeric EVM chain id (1, 10, 56, 137, 8453, 42161, 43114, ...).
    SellTokenQuery:
      in: query
      name: sellToken
      required: true
      schema:
        type: string
      description: Sell token contract address (or sentinel `0xEeee...EEeE` for native).
    BuyTokenQuery:
      in: query
      name: buyToken
      required: true
      schema:
        type: string
      description: Buy token contract address (or sentinel `0xEeee...EEeE` for native).
    SellAmountQuery:
      in: query
      name: sellAmount
      required: true
      schema:
        type: string
      description: Sell amount in base units (decimal string).
    SlippagePercentageQuery:
      in: query
      name: slippagePercentage
      required: false
      schema:
        type: number
        format: double
      description: Slippage tolerance as a decimal (e.g. 0.01 = 1%). Default 0.01.
    TakerQuery:
      in: query
      name: taker
      required: false
      schema:
        type: string
      description: Optional taker wallet address (improves quote accuracy).

  responses:
    ErrorResponse:
      description: Error response from the 0x API
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponseBody'

  schemas:
    SwapQuote:
      type: object
      additionalProperties: true
      description: |
        Loosely typed quote response. Fields vary across price/quote/gasless
        endpoints; consumers should pick what they need from the returned JSON.
        Common fields include `buyAmount`, `sellAmount`, `transaction`, `issues`,
        `route`, `trade`, `approval`, `tradeHash`, `status`.

    GaslessSubmitRequest:
      type: object
      required:
        - chainId
        - trade
      properties:
        chainId:
          type: integer
          format: int64
        trade:
          type: object
          additionalProperties: true
          description: Signed `trade` object returned by `getGaslessQuote`.
        approval:
          type: object
          additionalProperties: true
          description: Optional signed `approval` object returned by `getGaslessQuote`.
      additionalProperties: false

    ErrorResponseBody:
      type: object
      additionalProperties: true
      description: Free-form error payload returned by 0x.
