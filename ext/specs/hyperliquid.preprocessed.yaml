openapi: 3.0.3
info:
  title: Hyperliquid Info API
  description: |
    Hyperliquid public info endpoint. The whole read-only surface is a single
    `POST /info` URL discriminated by a `type` field in the JSON body
    (e.g. `{"type": "meta"}`, `{"type": "l2Book", "coin": "ETH"}`).

    Modelling each `type` variant as a distinct OpenAPI operation is not
    possible because progenitor requires a unique HTTP-method × path tuple per
    operation. Instead the spec exposes one operation that accepts a free-form
    JSON object body; the curated tool layer builds the appropriate request
    JSON for each user-facing tool and hands it to the generated client.

    ## Auth
    Public read endpoints — no API key required.
  version: '1.0'
servers:
- url: https://api.hyperliquid.xyz
paths:
  /info:
    post:
      summary: Discriminated read endpoint — body's `type` field selects the query.
      operationId: postInfo
      requestBody:
        content:
          application/json:
            schema:
              description: |
                Free-form request body. Required field `type` selects which
                read query to run. Optional fields depend on the type
                (e.g. `coin`, `user`, `startTime`, `endTime`, `req`).
              type: object
              additionalProperties: true
        required: true
      responses:
        '200':
          description: Response shape depends on the `type` field of the request.
          content:
            application/json:
              schema:
                description: Free-form JSON whose shape varies by request type.
