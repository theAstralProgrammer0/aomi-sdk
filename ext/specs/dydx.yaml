openapi: 3.0.3
info:
  title: dYdX v4 Indexer API
  version: '1.0'
  description: |
    Read-only public Indexer API for dYdX v4 (Cosmos-based perpetual futures DEX).

    ## Auth
    All endpoints in this spec are unauthenticated. Trades / orders are placed
    via signed Cosmos transactions and are explicitly out of scope.

    ## Notes
    Response bodies are typed loosely (`additionalProperties: true`) for fields
    that the upstream docs do not strictly schematize — the curated tool layer
    surfaces the JSON to callers verbatim, so partial typing is intentional.

servers:
  - url: https://indexer.dydx.trade/v4

paths:
  /perpetualMarkets:
    get:
      operationId: getPerpetualMarkets
      summary: List all perpetual markets, optionally filtered by ticker.
      parameters:
        - in: query
          name: ticker
          required: false
          schema: { type: string }
          description: Optional ticker filter (e.g. "BTC-USD").
      responses:
        '200':
          description: Map of markets keyed by ticker.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PerpetualMarketsResponse' }

  /orderbooks/perpetualMarket/{ticker}:
    get:
      operationId: getOrderbook
      summary: L2 orderbook snapshot for a perpetual market.
      parameters:
        - $ref: '#/components/parameters/Ticker'
      responses:
        '200':
          description: Bids and asks arrays.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrderbookResponse' }

  /candles/perpetualMarkets/{ticker}:
    get:
      operationId: getCandles
      summary: OHLCV candles for a perpetual market.
      parameters:
        - $ref: '#/components/parameters/Ticker'
        - in: query
          name: resolution
          required: true
          schema: { type: string }
          description: One of 1MIN, 5MINS, 15MINS, 30MINS, 1HOUR, 4HOURS, 1DAY.
        - in: query
          name: limit
          required: false
          schema: { type: integer, format: uint32, minimum: 1, maximum: 100 }
      responses:
        '200':
          description: Candle list.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CandlesResponse' }

  /trades/perpetualMarket/{ticker}:
    get:
      operationId: getTrades
      summary: Recent public trades for a perpetual market.
      parameters:
        - $ref: '#/components/parameters/Ticker'
        - in: query
          name: limit
          required: false
          schema: { type: integer, format: uint32, minimum: 1, maximum: 100 }
      responses:
        '200':
          description: Trade list.
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

  /addresses/{address}/subaccountNumber/{subaccountNumber}:
    get:
      operationId: getSubaccount
      summary: Get a subaccount snapshot for an address.
      parameters:
        - in: path
          name: address
          required: true
          schema: { type: string }
          description: dYdX bech32 address (e.g. dydx1...).
        - in: path
          name: subaccountNumber
          required: true
          schema: { type: integer, format: uint32 }
      responses:
        '200':
          description: Subaccount object.
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

  /orders:
    get:
      operationId: getOrders
      summary: Orders for a subaccount, optionally filtered by status / ticker.
      parameters:
        - in: query
          name: address
          required: true
          schema: { type: string }
        - in: query
          name: subaccountNumber
          required: true
          schema: { type: integer, format: uint32 }
        - in: query
          name: status
          required: false
          schema: { type: string }
          description: One of OPEN, FILLED, CANCELED, BEST_EFFORT_CANCELED, UNTRIGGERED.
        - in: query
          name: ticker
          required: false
          schema: { type: string }
      responses:
        '200':
          description: List of orders.
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

  /fills:
    get:
      operationId: getFills
      summary: Fills (executed trades) for a subaccount.
      parameters:
        - in: query
          name: address
          required: true
          schema: { type: string }
        - in: query
          name: subaccountNumber
          required: true
          schema: { type: integer, format: uint32 }
        - in: query
          name: market
          required: false
          schema: { type: string }
        - in: query
          name: limit
          required: false
          schema: { type: integer, format: uint32, minimum: 1, maximum: 100 }
      responses:
        '200':
          description: Fill list.
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

  /historicalFunding/{ticker}:
    get:
      operationId: getHistoricalFunding
      summary: Per-hour historical funding rate series for a market.
      parameters:
        - $ref: '#/components/parameters/Ticker'
        - in: query
          name: limit
          required: false
          schema: { type: integer, format: uint32, minimum: 1, maximum: 100 }
      responses:
        '200':
          description: Funding rate series.
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

components:
  parameters:
    Ticker:
      in: path
      name: ticker
      required: true
      schema: { type: string }
      description: Market ticker (e.g. "BTC-USD").

  schemas:
    PerpetualMarketsResponse:
      type: object
      properties:
        markets:
          type: object
          additionalProperties: true
      additionalProperties: true

    OrderbookLevel:
      type: object
      properties:
        price: { type: string }
        size: { type: string }
      additionalProperties: true

    OrderbookResponse:
      type: object
      properties:
        bids:
          type: array
          items: { $ref: '#/components/schemas/OrderbookLevel' }
        asks:
          type: array
          items: { $ref: '#/components/schemas/OrderbookLevel' }
      additionalProperties: true

    CandlesResponse:
      type: object
      properties:
        candles:
          type: array
          items:
            type: object
            additionalProperties: true
      additionalProperties: true
