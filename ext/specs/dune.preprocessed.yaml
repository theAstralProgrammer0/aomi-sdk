openapi: 3.0.1
info:
  title: DuneAPI
  description: Dune API
  contact: {}
  version: '1.0'
servers:
- url: https://api.dune.com/api
paths:
  /v1/dashboards:
    post:
      summary: Create a dashboard
      description: Creates a new dashboard with optional visualization and text widgets.
      operationId: postv1_dashboards
      parameters:
      - in: header
        name: X-Dune-Api-Key
        description: API Key for the service
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        description: CreateDashboardRequest
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/models.CreateDashboardCrudRequest'
        required: true
        x-originalParamName: body
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.DashboardCrudResponse'
      x-required-scope: Read/Write
  /v1/dashboards/by-slug/{owner_handle}/{slug}:
    get:
      summary: Get a dashboard by owner handle and slug
      description: Retrieves the full state of a dashboard using the owner handle and URL slug.
      operationId: getv1_dashboards_by_slug_ownerhandle_slug
      parameters:
      - in: header
        name: X-Dune-Api-Key
        description: API Key for the service
        required: true
        schema:
          type: string
        style: simple
      - in: path
        name: owner_handle
        description: Owner username or team handle
        required: true
        schema:
          type: string
        style: simple
      - in: path
        name: slug
        description: Dashboard URL slug
        required: true
        schema:
          type: string
        style: simple
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.DashboardCrudResponse'
      x-required-scope: Read
  /v1/dashboards/{dashboard_id}:
    get:
      summary: Get a dashboard by ID
      description: Retrieves the full state of a dashboard including widgets.
      operationId: getv1_dashboards_dashboardid
      parameters:
      - in: header
        name: X-Dune-Api-Key
        description: API Key for the service
        required: true
        schema:
          type: string
        style: simple
      - in: path
        name: dashboard_id
        description: Dashboard ID
        required: true
        schema:
          type: integer
        style: simple
      responses:
        '200':
          description: OK
          content:
            application/json:
