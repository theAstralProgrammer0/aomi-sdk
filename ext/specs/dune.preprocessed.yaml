        name:
          type: string
        performance:
          description: |-
            Performance tier for the refresh execution. Accepts `small`, `medium`, `large`.
            Omit to use the default tier for the source query's engine.
          type: string
        query_id:
          type: integer
    matviews.MatviewsUpsertResponse:
      type: object
      properties:
        execution_id:
          example: 01HZ065JVE23C23FM2HKWQP2RT
