                $ref: '#/components/schemas/models.DashboardCrudResponse'
      x-required-scope: Read
    patch:
      summary: Update a dashboard
      description: Updates dashboard metadata and/or replaces widgets.
      operationId: patchv1_dashboards_dashboardid
      parameters:
      - in: header
        name: X-Dune-Api-Key
        description: API Key for the service
        required: true
        schema:
          type: string
        style: simple
      - in: path
        name: dashboard_id
        description: Dashboard ID
        required: true
        schema:
          type: integer
        style: simple
      requestBody:
        description: UpdateDashboardRequest
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/models.UpdateDashboardCrudRequest'
        required: true
        x-originalParamName: body
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.DashboardCrudResponse'
      x-required-scope: Read/Write
