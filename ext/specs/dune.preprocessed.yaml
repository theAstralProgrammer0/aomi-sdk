        description: API Key for the service
        required: true
        schema:
          type: string
        style: simple
      - in: query
        name: api_key
        description: API Key, alternative to using the HTTP header X-Dune-Api-Key
        schema:
          type: string
        style: form
      - in: query
        name: limit
        description: Number of results to return (default 50, max 250)
        schema:
          type: integer
        style: form
      - in: query
        name: offset
        description: Offset for pagination
        schema:
          type: integer
        style: form
      - in: query
        name: owner_handle
