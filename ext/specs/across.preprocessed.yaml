openapi: 3.0.3
info:
  title: Across Protocol API
  description: |
    Across Protocol bridge REST API — public, no auth required.

    Covers the four endpoints used by the Aomi `across` app:
      - GET /available-routes
      - GET /limits
      - GET /suggested-fees
      - GET /deposit/status

    Default host is `https://app.across.to/api`. All endpoints are unauthenticated.
  version: '1.0'
servers:
- url: https://app.across.to/api
paths:
  /available-routes:
    get:
      summary: List supported bridge routes (origin → destination token pairs).
      operationId: getAvailableRoutes
      parameters:
      - in: query
        name: originChainId
        schema:
          type: integer
          format: int64
        style: form
      - in: query
        name: destinationChainId
        schema:
          type: integer
          format: int64
        style: form
      - in: query
        name: originToken
        schema:
          type: string
        style: form
      - in: query
        name: destinationToken
        schema:
          type: string
        style: form
      responses:
        '200':
          description: Array of supported route entries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AcrossRoute'
  /limits:
    get:
      summary: Min/max bridge amounts and instant-fill caps for a route.
      operationId: getLimits
      parameters:
      - in: query
        name: inputToken
        required: true
        schema:
          type: string
        style: form
      - in: query
        name: outputToken
        required: true
        schema:
          type: string
        style: form
      - in: query
        name: originChainId
        required: true
        schema:
          type: integer
          format: int64
        style: form
      - in: query
        name: destinationChainId
        required: true
        schema:
          type: integer
          format: int64
        style: form
      responses:
        '200':
          description: Limits for the requested route.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcrossLimits'
  /suggested-fees:
    get:
      summary: Fee quote and relayer parameters for a bridge.
      operationId: getSuggestedFees
      parameters:
      - in: query
        name: inputToken
        required: true
        schema:
          type: string
        style: form
      - in: query
        name: outputToken
        required: true
        schema:
          type: string
        style: form
      - in: query
        name: originChainId
        required: true
        schema:
          type: integer
          format: int64
        style: form
      - in: query
        name: destinationChainId
        required: true
        schema:
          type: integer
          format: int64
        style: form
      - in: query
        name: amount
        required: true
        schema:
          type: string
        style: form
      - in: query
        name: recipient
        schema:
          type: string
        style: form
      - in: query
        name: message
        schema:
          type: string
        style: form
      responses:
        '200':
          description: Suggested fees + relayer parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcrossSuggestedFees'
  /deposit/status:
    get:
      summary: Current fill status for a submitted deposit.
      operationId: getDepositStatus
      parameters:
      - in: query
        name: originChainId
        required: true
        schema:
          type: integer
          format: int64
        style: form
      - in: query
        name: depositId
        required: true
        schema:
          type: integer
          format: int64
        style: form
      responses:
        '200':
          description: Deposit status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcrossDepositStatus'
components:
  schemas:
    AcrossRoute:
      type: object
      properties:
        originChainId:
          type: integer
          format: int64
        originToken:
          type: string
        destinationChainId:
          type: integer
          format: int64
        destinationToken:
          type: string
        originTokenSymbol:
          nullable: true
          type: string
        destinationTokenSymbol:
          nullable: true
          type: string
        isNative:
          nullable: true
          type: boolean
      required:
      - originChainId
      - originToken
      - destinationChainId
      - destinationToken
      additionalProperties: true
    AcrossLimits:
      type: object
      properties:
        minDeposit:
          type: string
        maxDeposit:
          type: string
        maxDepositInstant:
          type: string
        maxDepositShortDelay:
          type: string
        recommendedDepositInstant:
          type: string
      required:
      - minDeposit
      - maxDeposit
      - maxDepositInstant
      - maxDepositShortDelay
      - recommendedDepositInstant
      additionalProperties: true
    AcrossFeeComponent:
      type: object
      properties:
        pct:
          type: string
        total:
          type: string
      required:
      - pct
      - total
    AcrossTokenRef:
      type: object
      properties:
        address:
          type: string
        symbol:
          type: string
        decimals:
          type: integer
          format: int64
        chainId:
          type: integer
          format: int64
      required:
      - address
      - symbol
      - decimals
      - chainId
    AcrossSuggestedFees:
      type: object
      properties:
        estimatedFillTimeSec:
          nullable: true
          type: integer
          format: int64
        totalRelayFee:
          $ref: '#/components/schemas/AcrossFeeComponent'
        relayerCapitalFee:
          $ref: '#/components/schemas/AcrossFeeComponent'
        relayerGasFee:
          $ref: '#/components/schemas/AcrossFeeComponent'
        lpFee:
          $ref: '#/components/schemas/AcrossFeeComponent'
        limits:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/AcrossLimits'
        outputAmount:
          type: string
        inputToken:
          $ref: '#/components/schemas/AcrossTokenRef'
        outputToken:
          $ref: '#/components/schemas/AcrossTokenRef'
      required:
      - totalRelayFee
      - relayerCapitalFee
      - relayerGasFee
      - lpFee
      - outputAmount
      - inputToken
      - outputToken
      additionalProperties: true
    AcrossDepositStatus:
      type: object
      properties:
        status:
          type: string
      required:
      - status
      additionalProperties: true
