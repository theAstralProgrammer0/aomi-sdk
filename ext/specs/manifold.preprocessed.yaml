openapi: 3.0.3
info:
  title: Manifold Markets API
  description: |
    Subset of the Manifold Markets v0 REST API covering the endpoints used by
    the Aomi Manifold app.

    ## Auth
    Read endpoints (markets, search, positions) are public. Write endpoints
    (POST /bet, POST /market) require an API key sent as
    `Authorization: Key <api_key>`. The codegen describes the header via the
    `apiKeyAuth` security scheme.
  version: 0.1.0
servers:
- url: https://api.manifold.markets/v0
  description: Production
paths:
  /markets:
    get:
      summary: List markets (newest / hottest)
      operationId: listMarkets
      parameters:
      - in: query
        name: limit
        schema:
          type: integer
          format: int32
        style: form
      - in: query
        name: sort
        schema:
          type: string
        style: form
      - in: query
        name: topics
        schema:
          type: string
        style: form
      responses:
        '200':
          description: Array of LiteMarket
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LiteMarket'
  /search-markets:
    get:
      summary: Keyword search across markets
      operationId: searchMarkets
      parameters:
      - in: query
        name: term
        required: true
        schema:
          type: string
        style: form
      - in: query
        name: sort
        schema:
          type: string
        style: form
      - in: query
        name: filter
        schema:
          type: string
        style: form
      responses:
        '200':
          description: Array of LiteMarket
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LiteMarket'
  /market/{idOrSlug}:
    get:
      summary: Get a market by id or slug
      operationId: getMarket
      parameters:
      - in: path
        name: idOrSlug
        required: true
        schema:
          type: string
        style: simple
      responses:
        '200':
          description: Full market detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FullMarket'
  /market/{idOrSlug}/positions:
    get:
      summary: Get top positions for a market
      operationId: getMarketPositions
      parameters:
      - in: path
        name: idOrSlug
        required: true
        schema:
          type: string
        style: simple
      responses:
        '200':
          description: Array of position objects
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
  /bet:
    post:
      summary: Place a bet on a binary market
      operationId: placeBet
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaceBetRequest'
        required: true
      responses:
        '200':
          description: Bet placed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaceBetResponse'
      security:
      - apiKeyAuth: []
  /market:
    post:
      summary: Create a new market
      operationId: createMarket
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMarketRequest'
        required: true
      responses:
        '200':
          description: Market created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateMarketResponse'
      security:
      - apiKeyAuth: []
components:
  schemas:
    LiteMarket:
      type: object
      properties:
        id:
          type: string
        question:
          type: string
        url:
          type: string
        probability:
          type: number
          format: double
        volume:
          type: number
          format: double
        createdTime:
          type: integer
          format: int64
        closeTime:
          type: integer
          format: int64
        isResolved:
          type: boolean
    FullMarket:
      type: object
      properties:
        id:
          type: string
        question:
          type: string
        url:
          type: string
        textDescription:
          type: string
        creatorName:
          type: string
        createdTime:
          type: integer
          format: int64
        closeTime:
          type: integer
          format: int64
        probability:
          type: number
          format: double
        volume:
          type: number
          format: double
        totalLiquidity:
          type: number
          format: double
        isResolved:
          type: boolean
        resolution:
          type: string
        mechanism:
          type: string
        outcomeType:
          type: string
    PlaceBetResponse:
      type: object
      properties:
        betId:
          type: string
        contractId:
          type: string
        amount:
          type: number
          format: double
        outcome:
          type: string
        probAfter:
          type: number
          format: double
    CreateMarketResponse:
      type: object
      properties:
        id:
          type: string
        url:
          type: string
        slug:
          type: string
        question:
          type: string
    PlaceBetRequest:
      type: object
      properties:
        contractId:
          type: string
        amount:
          type: number
          format: double
        outcome:
          description: YES or NO for binary markets.
          type: string
      required:
      - contractId
      - amount
      - outcome
    CreateMarketRequest:
      type: object
      properties:
        outcomeType:
          description: Currently only BINARY is supported by this client.
          type: string
        question:
          type: string
        initialProb:
          type: integer
          format: int32
          minimum: 1
          maximum: 99
        closeTime:
          type: integer
          format: int64
      required:
      - outcomeType
      - question
      - initialProb
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
      description: |
        Send your API key as `Authorization: Key <api_key>`. The codegen treats
        the entire header value as opaque, so the caller must format the
        `Key <api_key>` prefix at runtime.
security: []
