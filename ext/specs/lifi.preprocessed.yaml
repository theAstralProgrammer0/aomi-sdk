openapi: 3.0.3
info:
  title: LI.FI API
  description: |
    LI.FI cross-chain swap and bridge aggregator API.

    ## Auth
    Optional Bearer token in the `x-lifi-api-key` header. Quoting and status
    work without an API key.

    Endpoints covered: `/v1/quote`, `/v1/status`, `/v1/chains`, `/v1/tokens`.
    Composite tools (build_swap_tx, build_bridge_tx) layer on top in the
    curated tool layer.
  version: 1.0.0
servers:
- url: https://li.quest
  description: Production
paths:
  /v1/quote:
    get:
      summary: Get a same-chain or cross-chain swap quote with executable transaction
      operationId: getQuote
      parameters:
      - in: query
        name: fromChain
        description: Source chain id or canonical name (e.g. "1" or "ETH").
        required: true
        schema:
          type: string
        style: form
      - in: query
        name: toChain
        description: Destination chain id or canonical name.
        required: true
        schema:
          type: string
        style: form
      - in: query
        name: fromToken
        description: Source token contract address (or sentinel for native).
        required: true
        schema:
          type: string
        style: form
      - in: query
        name: toToken
        description: Destination token contract address (or sentinel for native).
        required: true
        schema:
          type: string
        style: form
      - in: query
        name: fromAmount
        description: Sell amount in source-token base units (decimal string).
        required: true
        schema:
          type: string
        style: form
      - in: query
        name: fromAddress
        description: Sender wallet address.
        required: true
        schema:
          type: string
        style: form
      - in: query
        name: toAddress
        description: Receiver wallet address. Defaults to fromAddress.
        schema:
          type: string
        style: form
      - in: query
        name: slippage
        description: Slippage tolerance as a decimal (0.005 = 0.5%).
        schema:
          type: number
          format: double
        style: form
      responses:
        '200':
          description: Quote with `transactionRequest` and `estimate` payloads
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LifiQuote'
  /v1/status:
    get:
      summary: Track the lifecycle of a cross-chain transfer by source-chain tx hash
      operationId: getStatus
      parameters:
      - in: query
        name: txHash
        required: true
        schema:
          type: string
        style: form
      - in: query
        name: fromChain
        schema:
          type: string
        style: form
      - in: query
        name: toChain
        schema:
          type: string
        style: form
      - in: query
        name: bridge
        schema:
          type: string
        style: form
      responses:
        '200':
          description: Transfer status (NOT_FOUND / PENDING / DONE / FAILED)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LifiStatus'
  /v1/chains:
    get:
      summary: List supported chains
      operationId: getChains
      parameters:
      - in: query
        name: chainTypes
        description: Comma-separated chain types (EVM, SVM).
        schema:
          type: string
        style: form
      responses:
        '200':
          description: Supported chains
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LifiChainsResponse'
  /v1/tokens:
    get:
      summary: List supported tokens, optionally filtered by chain
      operationId: getTokens
      parameters:
      - in: query
        name: chains
        description: Comma-separated chain IDs (e.g. "1,137,8453").
        schema:
          type: string
        style: form
      - in: query
        name: chainTypes
        description: Comma-separated chain types (EVM, SVM).
        schema:
          type: string
        style: form
      responses:
        '200':
          description: Supported tokens, keyed by chain ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LifiTokensResponse'
components:
  schemas:
    LifiQuote:
      description: |
        LI.FI quote response. Contains `id`, `tool`, `action`, `estimate`,
        `transactionRequest` (when an executable route was found), and
        `includedSteps`. The shape varies per route so we expose it as a
        loose object — the curated tool layer extracts what it needs.
      type: object
      additionalProperties: true
    LifiStatus:
      type: object
      additionalProperties: true
    LifiChainsResponse:
      type: object
      additionalProperties: true
    LifiTokensResponse:
      type: object
      additionalProperties: true
    LifiError:
      type: object
      additionalProperties: true
  responses:
    ErrorResponse:
      description: Error response from the LI.FI API
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/LifiError'
