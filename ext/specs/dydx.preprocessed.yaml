openapi: 3.0.3
info:
  title: dYdX v4 Indexer API
  description: |
    Read-only public Indexer API for dYdX v4 (Cosmos-based perpetual futures DEX).

    ## Auth
    All endpoints in this spec are unauthenticated. Trades / orders are placed
    via signed Cosmos transactions and are explicitly out of scope.

    ## Notes
    Response bodies are typed loosely (`additionalProperties: true`) for fields
    that the upstream docs do not strictly schematize — the curated tool layer
    surfaces the JSON to callers verbatim, so partial typing is intentional.
  version: '1.0'
servers:
- url: https://indexer.dydx.trade/v4
paths:
  /perpetualMarkets:
    get:
      summary: List all perpetual markets, optionally filtered by ticker.
      operationId: getPerpetualMarkets
      parameters:
      - in: query
        name: ticker
        description: Optional ticker filter (e.g. "BTC-USD").
        schema:
          type: string
        style: form
      responses:
        '200':
          description: Map of markets keyed by ticker.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PerpetualMarketsResponse'
  /orderbooks/perpetualMarket/{ticker}:
    get:
      summary: L2 orderbook snapshot for a perpetual market.
      operationId: getOrderbook
      parameters:
      - $ref: '#/components/parameters/Ticker'
      responses:
        '200':
          description: Bids and asks arrays.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderbookResponse'
  /candles/perpetualMarkets/{ticker}:
    get:
      summary: OHLCV candles for a perpetual market.
      operationId: getCandles
      parameters:
      - $ref: '#/components/parameters/Ticker'
      - in: query
        name: resolution
        description: One of 1MIN, 5MINS, 15MINS, 30MINS, 1HOUR, 4HOURS, 1DAY.
        required: true
        schema:
          type: string
        style: form
      - in: query
        name: limit
        schema:
          type: integer
          format: uint32
          minimum: 1
          maximum: 100
        style: form
      responses:
        '200':
          description: Candle list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CandlesResponse'
  /trades/perpetualMarket/{ticker}:
    get:
      summary: Recent public trades for a perpetual market.
      operationId: getTrades
      parameters:
      - $ref: '#/components/parameters/Ticker'
      - in: query
        name: limit
        schema:
          type: integer
          format: uint32
          minimum: 1
          maximum: 100
        style: form
      responses:
        '200':
          description: Trade list.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /addresses/{address}/subaccountNumber/{subaccountNumber}:
    get:
      summary: Get a subaccount snapshot for an address.
      operationId: getSubaccount
      parameters:
      - in: path
        name: address
        description: dYdX bech32 address (e.g. dydx1...).
        required: true
        schema:
          type: string
        style: simple
      - in: path
        name: subaccountNumber
        required: true
        schema:
          type: integer
          format: uint32
        style: simple
      responses:
        '200':
          description: Subaccount object.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /orders:
    get:
      summary: Orders for a subaccount, optionally filtered by status / ticker.
      operationId: getOrders
      parameters:
      - in: query
        name: address
        required: true
        schema:
          type: string
        style: form
      - in: query
        name: subaccountNumber
        required: true
        schema:
          type: integer
          format: uint32
        style: form
      - in: query
        name: status
        description: One of OPEN, FILLED, CANCELED, BEST_EFFORT_CANCELED, UNTRIGGERED.
        schema:
          type: string
        style: form
      - in: query
        name: ticker
        schema:
          type: string
        style: form
      responses:
        '200':
          description: List of orders.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /fills:
    get:
      summary: Fills (executed trades) for a subaccount.
      operationId: getFills
      parameters:
      - in: query
        name: address
        required: true
        schema:
          type: string
        style: form
      - in: query
        name: subaccountNumber
        required: true
        schema:
          type: integer
          format: uint32
        style: form
      - in: query
        name: market
        schema:
          type: string
        style: form
      - in: query
        name: limit
        schema:
          type: integer
          format: uint32
          minimum: 1
          maximum: 100
        style: form
      responses:
        '200':
          description: Fill list.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /historicalFunding/{ticker}:
    get:
      summary: Per-hour historical funding rate series for a market.
      operationId: getHistoricalFunding
      parameters:
      - $ref: '#/components/parameters/Ticker'
      - in: query
        name: limit
        schema:
          type: integer
          format: uint32
          minimum: 1
          maximum: 100
        style: form
      responses:
        '200':
          description: Funding rate series.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
components:
  schemas:
    PerpetualMarketsResponse:
      type: object
      properties:
        markets:
          type: object
          additionalProperties: true
      additionalProperties: true
    OrderbookLevel:
      type: object
      properties:
        price:
          type: string
        size:
          type: string
      additionalProperties: true
    OrderbookResponse:
      type: object
      properties:
        bids:
          type: array
          items:
            $ref: '#/components/schemas/OrderbookLevel'
        asks:
          type: array
          items:
            $ref: '#/components/schemas/OrderbookLevel'
      additionalProperties: true
    CandlesResponse:
      type: object
      properties:
        candles:
          type: array
          items:
            type: object
            additionalProperties: true
      additionalProperties: true
  parameters:
    Ticker:
      in: path
      name: ticker
      description: Market ticker (e.g. "BTC-USD").
      required: true
      schema:
        type: string
      style: simple
