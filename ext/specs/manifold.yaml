openapi: 3.0.3
info:
  title: Manifold Markets API
  version: "0.1.0"
  description: |
    Subset of the Manifold Markets v0 REST API covering the endpoints used by
    the Aomi Manifold app.

    ## Auth
    Read endpoints (markets, search, positions) are public. Write endpoints
    (POST /bet, POST /market) require an API key sent as
    `Authorization: Key <api_key>`. The codegen describes the header via the
    `apiKeyAuth` security scheme.
servers:
  - url: https://api.manifold.markets/v0
    description: Production
security: []
paths:
  /markets:
    get:
      operationId: listMarkets
      summary: List markets (newest / hottest)
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, format: int32 }
        - name: sort
          in: query
          required: false
          schema: { type: string }
        - name: topics
          in: query
          required: false
          schema: { type: string }
      responses:
        '200':
          description: Array of LiteMarket
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LiteMarket'
  /search-markets:
    get:
      operationId: searchMarkets
      summary: Keyword search across markets
      parameters:
        - name: term
          in: query
          required: true
          schema: { type: string }
        - name: sort
          in: query
          required: false
          schema: { type: string }
        - name: filter
          in: query
          required: false
          schema: { type: string }
      responses:
        '200':
          description: Array of LiteMarket
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LiteMarket'
  /market/{idOrSlug}:
    get:
      operationId: getMarket
      summary: Get a market by id or slug
      parameters:
        - name: idOrSlug
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Full market detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FullMarket'
  /market/{idOrSlug}/positions:
    get:
      operationId: getMarketPositions
      summary: Get top positions for a market
      parameters:
        - name: idOrSlug
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Array of position objects
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
  /bet:
    post:
      operationId: placeBet
      summary: Place a bet on a binary market
      security:
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaceBetRequest'
      responses:
        '200':
          description: Bet placed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaceBetResponse'
  /market:
    post:
      operationId: createMarket
      summary: Create a new market
      security:
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMarketRequest'
      responses:
        '200':
          description: Market created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateMarketResponse'
components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
      description: |
        Send your API key as `Authorization: Key <api_key>`. The codegen treats
        the entire header value as opaque, so the caller must format the
        `Key <api_key>` prefix at runtime.
  schemas:
    LiteMarket:
      type: object
      properties:
        id:
          type: string
        question:
          type: string
        url:
          type: string
        probability:
          type: number
          format: double
        volume:
          type: number
          format: double
        createdTime:
          type: integer
          format: int64
        closeTime:
          type: integer
          format: int64
        isResolved:
          type: boolean
    FullMarket:
      type: object
      properties:
        id:
          type: string
        question:
          type: string
        url:
          type: string
        textDescription:
          type: string
        creatorName:
          type: string
        createdTime:
          type: integer
          format: int64
        closeTime:
          type: integer
          format: int64
        probability:
          type: number
          format: double
        volume:
          type: number
          format: double
        totalLiquidity:
          type: number
          format: double
        isResolved:
          type: boolean
        resolution:
          type: string
        mechanism:
          type: string
        outcomeType:
          type: string
    PlaceBetResponse:
      type: object
      properties:
        betId:
          type: string
        contractId:
          type: string
        amount:
          type: number
          format: double
        outcome:
          type: string
        probAfter:
          type: number
          format: double
    CreateMarketResponse:
      type: object
      properties:
        id:
          type: string
        url:
          type: string
        slug:
          type: string
        question:
          type: string
    PlaceBetRequest:
      type: object
      required:
        - contractId
        - amount
        - outcome
      properties:
        contractId:
          type: string
        amount:
          type: number
          format: double
        outcome:
          type: string
          description: "YES or NO for binary markets."
    CreateMarketRequest:
      type: object
      required:
        - outcomeType
        - question
        - initialProb
      properties:
        outcomeType:
          type: string
          description: "Currently only BINARY is supported by this client."
        question:
          type: string
        initialProb:
          type: integer
          format: int32
          minimum: 1
          maximum: 99
        closeTime:
          type: integer
          format: int64
