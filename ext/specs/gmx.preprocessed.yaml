openapi: 3.0.3
info:
  title: GMX v2 Public API
  description: |
    GMX v2 public read-only REST API for synthetics on Arbitrum and Avalanche.

    ## Hosts
    GMX exposes the same surface on two hosts (one per chain). Each operation
    here uses the relative path; callers select the host by passing the
    appropriate `baseurl` to the client constructor:
      - `https://arbitrum-api.gmxinfra.io`  (default — Arbitrum deployment)
      - `https://avalanche-api.gmxinfra.io` (Avalanche deployment)

    ## Auth
    Unauthenticated. All endpoints are public read-only.

    ## Response shapes
    Most response payloads are loosely typed (`additionalProperties: true`)
    because GMX's docs do not publish strict JSON schemas. The curated tool
    layer hands the raw JSON back to callers.
  version: '1.0'
servers:
- url: https://arbitrum-api.gmxinfra.io
paths:
  /prices/tickers:
    get:
      summary: Current oracle min/max prices for every listed token.
      operationId: getPrices
      responses:
        '200':
          description: Array of price tickers.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
  /signed_prices/latest:
    get:
      summary: Latest keeper-signed price packets (advanced).
      operationId: getSignedPrices
      responses:
        '200':
          description: Signed price packets.
          content:
            application/json:
              schema:
                type: object
                properties:
                  signedPrices:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                additionalProperties: true
  /markets/info:
    get:
      summary: All GM markets with funding/borrow rates, OI, pool composition.
      operationId: getMarkets
      responses:
        '200':
          description: Markets envelope.
          content:
            application/json:
              schema:
                type: object
                properties:
                  markets:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                additionalProperties: true
  /positions:
    get:
      summary: Open leveraged positions for an account.
      operationId: getPositions
      parameters:
      - in: query
        name: account
        description: Ethereum address (0x...) of the account.
        required: true
        schema:
          type: string
        style: form
      responses:
        '200':
          description: Positions envelope.
          content:
            application/json:
              schema:
                type: object
                properties:
                  positions:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                additionalProperties: true
  /orders:
    get:
      summary: Pending limit/trigger/stop orders for an account.
      operationId: getOrders
      parameters:
      - in: query
        name: account
        description: Ethereum address (0x...) of the account.
        required: true
        schema:
          type: string
        style: form
      responses:
        '200':
          description: Orders envelope.
          content:
            application/json:
              schema:
                type: object
                properties:
                  orders:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                additionalProperties: true
