openapi: 3.0.3
info:
  title: twitterapi.io X Read API
  description: |
    Subset of the twitterapi.io read-only X (Twitter) API covering the
    endpoints used by the Aomi `x` app. twitterapi.io is a third-party
    reseller — NOT the official X v2 API.

    ## Auth
    Every request requires the `X-API-Key` header. The codegen describes the
    header via the `apiKeyAuth` security scheme; the per-request value is set
    by the caller through a shared `reqwest::Client` with default headers.
  version: 0.1.0
servers:
- url: https://api.twitterapi.io
  description: Production
paths:
  /twitter/user/info:
    get:
      summary: Look up a user by handle
      operationId: getUserInfo
      parameters:
      - in: query
        name: userName
        required: true
        schema:
          type: string
        style: form
      responses:
        '200':
          description: Wrapped user payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
  /twitter/user/last_tweets:
    get:
      summary: Recent posts from a single user
      operationId: getUserLastTweets
      parameters:
      - in: query
        name: userName
        required: true
        schema:
          type: string
        style: form
      - in: query
        name: cursor
        schema:
          type: string
        style: form
      responses:
        '200':
          description: Wrapped posts payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostsResponse'
  /twitter/tweet/advanced_search:
    get:
      summary: Advanced search across posts
      operationId: searchTweets
      parameters:
      - in: query
        name: query
        required: true
        schema:
          type: string
        style: form
      - in: query
        name: queryType
        required: true
        schema:
          description: Latest or Top
          type: string
        style: form
      - in: query
        name: cursor
        schema:
          type: string
        style: form
      responses:
        '200':
          description: Wrapped posts payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostsResponse'
  /twitter/trends:
    get:
      summary: Trending topics
      operationId: getTrends
      parameters:
      - in: query
        name: woeid
        schema:
          type: integer
          format: int64
        style: form
      - in: query
        name: count
        schema:
          type: integer
          format: int64
        style: form
      responses:
        '200':
          description: Wrapped trends payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrendsResponse'
  /twitter/tweet/info:
    get:
      summary: One post by id
      operationId: getTweetInfo
      parameters:
      - in: query
        name: tweetId
        required: true
        schema:
          type: string
        style: form
      responses:
        '200':
          description: Wrapped post payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostResponse'
components:
  schemas:
    UserResponse:
      type: object
      properties:
        msg:
          type: string
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/UserPayload'
    PostsResponse:
      type: object
      properties:
        msg:
          type: string
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/PostsData'
    PostResponse:
      type: object
      properties:
        msg:
          type: string
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/Post'
    TrendsResponse:
      type: object
      properties:
        msg:
          type: string
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/TrendsData'
    UserPayload:
      type: object
      properties:
        id:
          type: string
        userName:
          type: string
        name:
          type: string
        description:
          type: string
        location:
          type: string
        url:
          type: string
        followersCount:
          type: integer
          format: int64
        followingCount:
          type: integer
          format: int64
        favouritesCount:
          type: integer
          format: int64
        statusesCount:
          type: integer
          format: int64
        listedCount:
          type: integer
          format: int64
        createdAt:
          type: string
    PostsData:
      type: object
      properties:
        tweets:
          type: array
          items:
            $ref: '#/components/schemas/Post'
        next_cursor:
          type: string
        has_next_page:
          type: boolean
    TrendsData:
      type: object
      properties:
        trends:
          type: array
          items:
            $ref: '#/components/schemas/Trend'
    Post:
      type: object
      properties:
        id:
          type: string
        text:
          type: string
        fullText:
          type: string
        createdAt:
          type: string
        author:
          $ref: '#/components/schemas/PostAuthor'
        retweetCount:
          type: integer
          format: int64
        favoriteCount:
          type: integer
          format: int64
        replyCount:
          type: integer
          format: int64
        quoteCount:
          type: integer
          format: int64
        viewCount:
          type: integer
          format: int64
        lang:
          type: string
        isRetweet:
          type: boolean
        isQuote:
          type: boolean
        inReplyToStatusId:
          type: string
        conversationId:
          type: string
        hashtags:
          type: array
          items:
            type: string
        mentions:
          type: array
          items:
            $ref: '#/components/schemas/Mention'
        urls:
          type: array
          items:
            $ref: '#/components/schemas/UrlEntity'
    PostAuthor:
      type: object
      properties:
        id:
          type: string
        userName:
          type: string
        name:
          type: string
    Mention:
      type: object
      properties:
        userName:
          type: string
        name:
          type: string
    UrlEntity:
      type: object
      properties:
        expandedUrl:
          type: string
        displayUrl:
          type: string
    Trend:
      type: object
      properties:
        name:
          type: string
        url:
          type: string
        tweetCount:
          type: integer
          format: int64
        description:
          type: string
        domainContext:
          type: string
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
security:
- apiKeyAuth: []
