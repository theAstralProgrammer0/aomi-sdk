openapi: 3.0.3
info:
  title: Pelagos Appchain JSON-RPC API
  version: "0.1.0"
  description: |
    Stub OpenAPI surface for a self-hosted Pelagos appchain node, modelled
    from the Aomi `pelagos` app's existing client (`apps/pelagos/src/client.rs`).

    The Pelagos appchain exposes a single JSON-RPC POST endpoint at `/rpc`
    plus a `GET /health` liveness check. Because JSON-RPC multiplexes many
    methods over one path, this spec models each known method as a separate
    operation under a synthetic path (`/rpc#<method>`). Codegen will produce
    one Rust method per operation; the underlying HTTP request body always
    targets `POST /rpc` with `{ jsonrpc: "2.0", id, method, params }`.

    NOTE: This is a stub. There is no public Pelagos JSON-RPC reference
    discoverable as of the fetched_at date. Schemas are permissive
    (`additionalProperties: true`) and reflect only what the existing
    Aomi client sends/expects. Needs review against a real node spec
    once available.

    ## Auth
    No authentication is described. The appchain is assumed to be
    self-hosted (default `http://localhost:8080`); access control is
    expected to be handled at the network layer.

servers:
  - url: http://localhost:8080
    description: Default self-hosted Pelagos appchain
  - url: '{baseUrl}'
    description: User-supplied appchain URL (PELAGOS_RPC_URL)
    variables:
      baseUrl:
        default: http://localhost:8080

paths:
  /health:
    get:
      operationId: health
      summary: Liveness check for a Pelagos appchain node
      description: |
        Returns a 2xx response when the node is reachable. Body shape is
        not formally specified; clients should treat any 2xx as healthy.
      responses:
        '200':
          description: Node is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
            text/plain:
              schema:
                type: string

  /rpc:
    post:
      operationId: rpc
      summary: Generic JSON-RPC entrypoint
      description: |
        Catch-all JSON-RPC 2.0 endpoint. Send `{ jsonrpc: "2.0", id, method,
        params }`. The Aomi client also models known methods as dedicated
        operations below for ergonomic codegen; both routes hit this same
        path on the wire.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RpcRequestGeneric'
      responses:
        '200':
          description: JSON-RPC envelope (success or error)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RpcResponseGeneric'

  /rpc#getBalance:
    post:
      operationId: getBalance
      summary: Get a user's token balance on the appchain
      description: |
        Wire-level: POST /rpc with method = "getBalance" and
        params = [{ user, token }].
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/RpcRequestEnvelope'
                - type: object
                  properties:
                    method:
                      type: string
                      enum: [getBalance]
                    params:
                      type: array
                      minItems: 1
                      maxItems: 1
                      items:
                        $ref: '#/components/schemas/BalanceParams'
      responses:
        '200':
          description: JSON-RPC envelope wrapping the balance result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/RpcResponseEnvelope'
                  - type: object
                    properties:
                      result:
                        $ref: '#/components/schemas/BalanceResult'

  /rpc#getTransactionStatus:
    post:
      operationId: getTransactionStatus
      summary: Look up the lifecycle state of a transaction by hash
      description: |
        Wire-level: POST /rpc with method = "getTransactionStatus" and
        params = [hash].
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/RpcRequestEnvelope'
                - type: object
                  properties:
                    method:
                      type: string
                      enum: [getTransactionStatus]
                    params:
                      type: array
                      minItems: 1
                      maxItems: 1
                      items:
                        type: string
                        description: Transaction hash (hex string, 0x-prefixed)
      responses:
        '200':
          description: JSON-RPC envelope wrapping the transaction status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/RpcResponseEnvelope'
                  - type: object
                    properties:
                      result:
                        $ref: '#/components/schemas/TransactionStatus'

  /rpc#getTransactionReceipt:
    post:
      operationId: getTransactionReceipt
      summary: Fetch the finalized execution receipt for a settled transaction
      description: |
        Wire-level: POST /rpc with method = "getTransactionReceipt" and
        params = [hash]. Returns null for transactions not yet processed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/RpcRequestEnvelope'
                - type: object
                  properties:
                    method:
                      type: string
                      enum: [getTransactionReceipt]
                    params:
                      type: array
                      minItems: 1
                      maxItems: 1
                      items:
                        type: string
                        description: Transaction hash
      responses:
        '200':
          description: JSON-RPC envelope wrapping the receipt (or null)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/RpcResponseEnvelope'
                  - type: object
                    properties:
                      result:
                        $ref: '#/components/schemas/TransactionReceipt'

  /rpc#sendTransaction:
    post:
      operationId: sendTransaction
      summary: Submit a token transfer transaction
      description: |
        Wire-level: POST /rpc with method = "sendTransaction" and
        params = [TransferTransaction]. Caller supplies a unique `hash`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/RpcRequestEnvelope'
                - type: object
                  properties:
                    method:
                      type: string
                      enum: [sendTransaction]
                    params:
                      type: array
                      minItems: 1
                      maxItems: 1
                      items:
                        $ref: '#/components/schemas/TransferTransaction'
      responses:
        '200':
          description: JSON-RPC envelope wrapping the submission result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/RpcResponseEnvelope'
                  - type: object
                    properties:
                      result:
                        $ref: '#/components/schemas/SendTransactionResult'

components:
  schemas:
    RpcRequestEnvelope:
      type: object
      required: [jsonrpc, id, method]
      properties:
        jsonrpc:
          type: string
          enum: ["2.0"]
        id:
          oneOf:
            - type: integer
              format: int64
            - type: string
        method:
          type: string

    RpcRequestGeneric:
      allOf:
        - $ref: '#/components/schemas/RpcRequestEnvelope'
        - type: object
          properties:
            params:
              description: Positional params array (JSON-RPC 2.0)
              type: array
              items: {}

    RpcResponseEnvelope:
      type: object
      required: [jsonrpc, id]
      properties:
        jsonrpc:
          type: string
          enum: ["2.0"]
        id:
          oneOf:
            - type: integer
              format: int64
            - type: string
        error:
          $ref: '#/components/schemas/RpcError'

    RpcResponseGeneric:
      allOf:
        - $ref: '#/components/schemas/RpcResponseEnvelope'
        - type: object
          properties:
            result:
              description: Method-specific result; shape varies.
              nullable: true

    RpcError:
      type: object
      additionalProperties: true
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string
        data:
          description: Optional method-specific error payload.

    BalanceParams:
      type: object
      required: [user, token]
      properties:
        user:
          type: string
          description: Account name or address (e.g. "alice", "0x...").
        token:
          type: string
          description: Token symbol (e.g. "USDT").

    BalanceResult:
      description: |
        Token balance value. Schema is loose because the underlying response
        format is not publicly documented.
      additionalProperties: true
      type: object
      properties:
        balance:
          oneOf:
            - type: string
            - type: integer
              format: int64
        token:
          type: string
        user:
          type: string

    TransactionStatus:
      description: |
        Transaction lifecycle state. Observed values include "pending",
        "batched", "processed", "failed".
      additionalProperties: true
      type: object
      properties:
        status:
          type: string
        hash:
          type: string

    TransactionReceipt:
      description: |
        Finalized transaction receipt. Shape is not publicly documented;
        permissive object until a real spec is available.
      nullable: true
      additionalProperties: true
      type: object
      properties:
        hash:
          type: string
        status:
          type: string

    TransferTransaction:
      type: object
      required: [sender, receiver, value, token, hash]
      properties:
        sender:
          type: string
          description: Sender account name or address.
        receiver:
          type: string
          description: Recipient account name or address.
        value:
          type: integer
          format: int64
          minimum: 0
          description: Amount in the smallest token denomination.
        token:
          type: string
          description: Token symbol.
        hash:
          type: string
          description: Caller-supplied unique transaction hash (hex).

    SendTransactionResult:
      description: |
        Result of submitting a transaction. Shape is not publicly documented;
        treated as a permissive object.
      additionalProperties: true
      type: object
      properties:
        hash:
          type: string
        accepted:
          type: boolean

    HealthResponse:
      description: |
        Health check response. Shape is not formally specified; the Aomi
        client falls back to wrapping non-JSON bodies in `{ raw: "..." }`.
      additionalProperties: true
      type: object
      properties:
        status:
          type: string
        ok:
          type: boolean
