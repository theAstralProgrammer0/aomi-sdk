  /quote:
    post:
      operationId: postQuote
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                amountIn:
                  type: string
                chainId:
                  type: number
                permitActiveSeconds:
                  type: number
                recipient:
                  type: string
                referrer:
                  type: string
                sender:
                  type: string
                signatures:
                  type: array
                  items:
                    type: object
                    properties:
                      permit:
                        type: object
                        properties:
                          details:
                            type: object
                            properties:
                              amount:
                                type: string
                              expiration:
                                type: number
                              nonce:
                                type: number
                              token:
                                type: string
                            required:
                            - token
                            - amount
                            - expiration
                            - nonce
                          sigDeadline:
                            type: string
                          spender:
                            type: string
                        required:
                        - details
                        - spender
                        - sigDeadline
                      signature:
                        type: string
                    required:
                    - permit
                    - signature
                slippage:
                  default: 0.05
                  type: number
                tokenIn:
                  type: object
                  properties:
                    address:
                      type: string
                    type:
                      type: string
                      enum:
                      - eth
                      - erc20
                  required:
                  - type
                tokenOut:
                  type: object
                  properties:
                    address:
                      type: string
                    type:
                      type: string
                      enum:
                      - eth
                      - erc20
                  required:
                  - type
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  call:
                    type: object
                    properties:
                      data:
                        type: string
                      target:
                        type: string
                      value:
                        type: string
                    required:
                    - data
                    - value
                    - target
                  permits:
                    description: The approval information for the token
                    type: array
                    items:
                      type: object
                      properties:
                        permit:
                          type: object
                          properties:
                            details:
                              type: object
                              properties:
                                amount:
                                  type: string
                                expiration:
                                  type: number
                                nonce:
                                  type: number
                                token:
                                  type: string
                              required:
                              - token
                              - amount
                              - expiration
                              - nonce
                            sigDeadline:
                              type: string
                            spender:
                              type: string
                          required:
                          - details
                          - spender
                          - sigDeadline
                        signature:
                          type: string
                      required:
                      - permit
                      - signature
                  quote:
                    type: object
                    properties:
                      amountOut:
                        type: string
                      slippage:
                        type: number
                      tokenIn:
                        type: object
                        properties:
                          address:
                            type: string
                          type:
                            type: string
                    required:
                    - amountOut
                    - slippage
                  success:
                    type: boolean
                  trade:
                    type: object
                    properties:
                      commands:
                        type: array
                        items:
                          type: string
                      inputs:
                        type: array
                        items:
                          type: string
                      value:
                        type: string
                    required:
                    - commands
                    - value
                    - inputs
                required:
                - success
                - call
                - quote
