openapi: 3.0.3
info:
  title: Zora SDK API
  description: Access to Zora data for SDK users
  version: 1.0.0
servers:
- url: https://api-sdk.zora.engineering/
  description: SDK API Production Server
- url: https://api-sdk-staging.zora.engineering/
  description: SDK API Staging Server
- url: http://localhost:8787/
  description: SDK API Local Server
paths:
  /apiKey:
    get:
      summary: zoraSDK_apiKey query
      operationId: GetApiKey
      parameters:
      - in: query
        name: apiKey
        required: true
        schema:
          type: string
        style: form
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  apiKey:
                    type: object
                    properties:
                      apiKey:
                        description: The `String` scalar type represents textual data, represented as UTF-8 character sequences. The String type is most often used by GraphQL to represent free-form human-readable text.
                        type: string
                      isActive:
                        description: The `Boolean` scalar type represents `true` or `false`.
                        type: boolean
                    required:
                    - apiKey
                    - isActive
                required:
                - apiKey
