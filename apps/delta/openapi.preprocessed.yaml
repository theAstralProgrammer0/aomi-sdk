openapi: 3.0.3
info:
  title: Delta RFQ Arena API
  description: |
    HTTP API for the Delta RFQ Arena — an OTC Request-For-Quote trading
    backend that compiles natural-language quote text into machine-checkable
    "Local Laws" and verifies fills via ZK proofs.

    This spec describes ONLY the surface consumed by the `apps/delta` Aomi
    app crate. It is hand-drafted from `apps/delta/src/{client,tool,types}.rs`
    because there is no public OpenAPI document published upstream.

    ## Auth
    No authentication is declared on the wire — the crate hits a
    locally-running backend (default `http://localhost:3335`, overridable
    via the `DELTA_RFQ_API_URL` environment variable). If the deployment
    later adds bearer/API-key auth, add it under `securitySchemes` and apply
    via a top-level `security:` block.

    ## Loose schemas
    Several response fields are JSON-`object`-shaped passthroughs whose
    internal structure is not stable across backend versions:
      - `Quote.local_law` — compiled constraint document
      - `FillResponse.error`, `FillResponse.receipt`, `FillResponse.proof`
    These are typed `additionalProperties: true` rather than fabricated.
  version: 0.1.0
servers:
- url: http://localhost:3335
  description: Default local Delta RFQ backend
paths:
  /quotes:
    get:
      summary: List all active quotes in the arena.
      operationId: listQuotes
      responses:
        '200':
          description: Array of quotes currently visible in the arena.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Quote'
    post:
      summary: Create a new RFQ quote from natural language.
      description: |
        Submit a plain-English quote (e.g. "Buy 10 dETH at most 2000 USDD,
        expires in 5 minutes"). The backend parses the text and compiles a
        Local Law that subsequent fill attempts must satisfy.
      operationId: createQuote
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateQuoteRequest'
        required: true
      responses:
        '200':
          description: The newly created quote, including its compiled Local Law.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Quote'
  /quotes/{quote_id}:
    get:
      summary: Get detailed information about a specific quote.
      operationId: getQuote
      responses:
        '200':
          description: Quote detail, including the compiled Local Law if available.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Quote'
    parameters:
    - $ref: '#/components/parameters/QuoteId'
  /quotes/{quote_id}/fill:
    post:
      summary: Attempt to fill a quote with price-feed evidence.
      description: |
        Submit a fill proposal with size, price and a list of signed price
        feeds. The fill succeeds only if it satisfies all Local-Law
        constraints attached to the quote; otherwise the response carries
        an error describing the violated constraint.
      operationId: fillQuote
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FillQuoteRequest'
        required: true
      responses:
        '200':
          description: Fill outcome — may be success or a constraint failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FillResponse'
    parameters:
    - $ref: '#/components/parameters/QuoteId'
  /quotes/{quote_id}/receipts:
    get:
      summary: Get all fill receipts for a quote.
      description: Each receipt records one fill attempt, success or failure.
      operationId: getReceipts
      responses:
        '200':
          description: Array of receipts for this quote.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Receipt'
    parameters:
    - $ref: '#/components/parameters/QuoteId'
components:
  schemas:
    CreateQuoteRequest:
      type: object
      properties:
        text:
          description: |
            Natural-language quote (e.g. "Buy 10 dETH at most 2000 USDD,
            expires in 5 minutes"). The backend compiles this into a Local Law.
          type: string
        maker_owner_id:
          description: Maker's owner identifier.
          type: string
        maker_shard:
          description: Maker's shard number.
          type: integer
          format: int64
          minimum: 0
      required:
      - text
      - maker_owner_id
      - maker_shard
    FeedEvidence:
      type: object
      properties:
        source:
          description: Price-feed source name.
          type: string
        asset:
          description: Asset the price is for.
          type: string
        price:
          description: Price reported by this feed.
          type: number
          format: double
        timestamp:
          description: Unix timestamp of the price.
          type: integer
          format: int64
        signature:
          description: Cryptographic signature over the feed payload.
          type: string
      required:
      - source
      - asset
      - price
      - timestamp
      - signature
    FillQuoteRequest:
      type: object
      properties:
        taker_owner_id:
          description: Taker's owner identifier.
          type: string
        taker_shard:
          description: Taker's shard number.
          type: integer
          format: int64
          minimum: 0
        size:
          description: Size to fill.
          type: number
          format: double
        price:
          description: Price at which to fill.
          type: number
          format: double
        feed_evidence:
          description: Signed price-feed evidence backing the fill.
          type: array
          items:
            $ref: '#/components/schemas/FeedEvidence'
      required:
      - taker_owner_id
      - taker_shard
      - size
      - price
      - feed_evidence
    Quote:
      type: object
      properties:
        id:
          type: string
        text:
          description: Original natural-language quote.
          type: string
        status:
          description: Lifecycle status (e.g. active, filled, expired, cancelled).
          type: string
        asset:
          type: string
        direction:
          description: Direction (e.g. buy or sell).
          type: string
        size:
          type: number
          format: double
        price_limit:
          nullable: true
          description: Optional price bound parsed from the natural-language text.
          type: number
          format: double
        currency:
          type: string
        expires_at:
          description: Unix timestamp at which the quote expires.
          type: integer
          format: int64
        created_at:
          description: Unix timestamp at which the quote was created.
          type: integer
          format: int64
        maker_owner_id:
          type: string
        maker_shard:
          type: integer
          format: int64
          minimum: 0
        local_law:
          nullable: true
          description: |
            Compiled Local-Law document. Internal shape is opaque and may
            evolve across backend versions; treated as a JSON passthrough.
          type: object
          additionalProperties: true
        constraints_summary:
          nullable: true
          description: Human-readable summary of the compiled Local Law.
          type: string
        message:
          nullable: true
          description: Optional informational message from the backend.
          type: string
      required:
      - id
      - text
      - status
      - asset
      - direction
      - size
      - currency
      - expires_at
      - created_at
      - maker_owner_id
      - maker_shard
    FillResponse:
      type: object
      properties:
        success:
          type: boolean
        fill_id:
          type: string
        quote_id:
          type: string
        message:
          type: string
        error:
          nullable: true
          description: Constraint-violation details when success=false. Opaque shape.
          type: object
          additionalProperties: true
        receipt:
          nullable: true
          description: Embedded receipt object on success. Opaque shape.
          type: object
          additionalProperties: true
        proof:
          nullable: true
          description: ZK proof artifact emitted on success. Opaque shape.
          type: object
          additionalProperties: true
      required:
      - success
      - fill_id
      - quote_id
      - message
    Receipt:
      type: object
      properties:
        id:
          type: string
        quote_id:
          type: string
        success:
          type: boolean
        status:
          description: Receipt status (e.g. settled, rejected).
          type: string
        taker_owner_id:
          type: string
        taker_shard:
          type: integer
          format: int64
          minimum: 0
        size:
          type: number
          format: double
        price:
          type: number
          format: double
        attempted_at:
          description: Unix timestamp when the fill was attempted.
          type: integer
          format: int64
        error_code:
          nullable: true
          type: string
        error_message:
          nullable: true
          type: string
        sdl_hash:
          nullable: true
          description: Hash of the SDL/Local-Law document the fill was checked against.
          type: string
      required:
      - id
      - quote_id
      - success
      - status
      - taker_owner_id
      - taker_shard
      - size
      - price
      - attempted_at
  parameters:
    QuoteId:
      in: path
      name: quote_id
      description: Identifier of a quote in the arena.
      required: true
      schema:
        type: string
      style: simple
